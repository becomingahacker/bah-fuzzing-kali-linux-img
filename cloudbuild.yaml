substitutions:
  # Public Ubuntu family used as immutable base for pristine builds.
  _BASE_IMAGE_FAMILY: 'ubuntu-minimal-2404-lts-amd64'
  # Family where Packer publishes the workshop image.
  _OUTPUT_IMAGE_FAMILY: 'ubuntu-fuzzing-cml-amd64'
  # Name prefix used when creating images.
  _OUTPUT_IMAGE_NAME_PREFIX: 'ubuntu-fuzzing'
  _CML_ENDPOINT: 'https://becomingahacker.com'
  _GS_IMAGE_PATH: 'gs://bah-machine-images/ubuntu-fuzzing'
  _GS_CML_IMAGE_PATH: 'gs://bah-libvirt-images-ue1/virl-base-images/ubuntu-fuzzing'
  _GS_CML_IMAGE_DEFINITION_PATH: 'gs://bah-libvirt-images-ue1/virl-base-images/ubuntu-fuzzing/ubuntu-fuzzing.yaml'

steps:
  # Build image with Packer using Ubuntu family as source.
  - name: 'us-east1-docker.pkg.dev/gcp-asigbahgcp-nprd-47930/bah-builders/bah-kali-linux-img'
    script: |
      #!/usr/bin/env bash

      set -e
      set -x
      env

      echo "Locale settings:"
      cat /etc/default/locale

      PROVISION_SCRIPT="setup.sh"
      SOURCE_IMAGE_FAMILY="${BASE_IMAGE_FAMILY}"

      # SSH key pair for Packer.  Will be removed after build.
      mkdir -vp secrets
      ssh-keygen -t ed25519 -f secrets/id_ed25519 -C "root@ubuntu" -N ""

      # Build Ubuntu workshop image with Packer
      packer init ubuntu-fuzzing-gce.pkr.hcl
      packer validate \
        -var "service_account_email=$SERVICE_ACCOUNT_EMAIL" \
        -var "zone=$ZONE" \
        -var "project_id=$PROJECT_ID" \
        -var "source_image_family=$SOURCE_IMAGE_FAMILY" \
        -var "provision_script=$PROVISION_SCRIPT" \
        -var "output_image_family=$OUTPUT_IMAGE_FAMILY" \
        -var "output_image_name_prefix=$OUTPUT_IMAGE_NAME_PREFIX" \
        ubuntu-fuzzing-gce.pkr.hcl
      packer build \
        -var "service_account_email=$SERVICE_ACCOUNT_EMAIL" \
        -var "zone=$ZONE" \
        -var "project_id=$PROJECT_ID" \
        -var "source_image_family=$SOURCE_IMAGE_FAMILY" \
        -var "provision_script=$PROVISION_SCRIPT" \
        -var "output_image_family=$OUTPUT_IMAGE_FAMILY" \
        -var "output_image_name_prefix=$OUTPUT_IMAGE_NAME_PREFIX" \
        ubuntu-fuzzing-gce.pkr.hcl

      if [ -f /workspace/manifest.json ]; then
        jq . /workspace/manifest.json

        IMAGE=$(jq -r .builds[0].artifact_id /workspace/manifest.json)

        gcloud compute images export \
          --compute-service-account $SERVICE_ACCOUNT_EMAIL \
          --cloudbuild-service-account $SERVICE_ACCOUNT_EMAIL \
          --zone $ZONE \
          --image $IMAGE \
          --log-location ${GS_IMAGE_PATH} \
          --export-format qcow2 \
          --destination-uri ${GS_CML_IMAGE_PATH}/${IMAGE}.qcow2
        
        sed -i "s/DISK_IMAGE_NAME/${IMAGE}.qcow2/" /workspace/cml/image-definition.yaml
        gcloud storage cp /workspace/cml/image-definition.yaml ${GS_CML_IMAGE_DEFINITION_PATH}
      fi

    env:
      - 'CML_ENDPOINT=$_CML_ENDPOINT'
      - 'GS_IMAGE_PATH=$_GS_IMAGE_PATH'
      - 'GS_CML_IMAGE_PATH=$_GS_CML_IMAGE_PATH'
      - 'GS_CML_IMAGE_DEFINITION_PATH=$_GS_CML_IMAGE_DEFINITION_PATH'
      - 'BUILD_TYPE=$_BUILD_TYPE'
      - 'BASE_IMAGE_FAMILY=$_BASE_IMAGE_FAMILY'
      - 'OUTPUT_IMAGE_FAMILY=$_OUTPUT_IMAGE_FAMILY'
      - 'OUTPUT_IMAGE_NAME_PREFIX=$_OUTPUT_IMAGE_NAME_PREFIX'
      - 'APT_OPTS="-o Dpkg::Options::=--force-confmiss -o Dpkg::Options::=--force-confnew -o DPkg::Progress-Fancy=0 -o APT::Color=0"'
      - 'DEBIAN_FRONTEND=noninteractive'
      - 'TZ=Etc/UTC'
      - 'PACKER_LOG=1'
      - 'LOCATION=$LOCATION'
      - 'PROJECT_ID=$PROJECT_ID'
      - 'ZONE=$LOCATION-b'
      - 'SERVICE_ACCOUNT_EMAIL=$SERVICE_ACCOUNT_EMAIL'

logsBucket: 'gs://bah-build-logs/bah-kali-linux-img'
serviceAccount: 'projects/gcp-asigbahgcp-nprd-47930/serviceAccounts/build-bah-kali-linux-img@gcp-asigbahgcp-nprd-47930.iam.gserviceaccount.com'

options:
  logging: GCS_ONLY
  logStreamingOption: STREAM_ON
  automapSubstitutions: true
