substitutions:
  _KALI_VER: '2025.4'
  # Delete this image with this family if you want to build a new one from Offensive 
  # Security's Kali Linux generic cloud image.
  _GCE_BASE_SOURCE_FAMILY: 'kali-linux-cloud-genericcloud-amd64'
  # Delete this image with this image family if you want to build a new one from scratch.
  _GCE_BASE_FAMILY: 'kali-linux-cloud-gce-amd64'
  # 'pristine' or 'tweaks' - determines the source image family and provision 
  # script, scripts/setup.sh or scripts/tweaks.sh
  _BUILD_TYPE: 'tweaks'
  _CML_ENDPOINT: 'https://becomingahacker.com'
  _GS_IMAGE_PATH: 'gs://bah-machine-images/kali-linux'
  _GS_CML_IMAGE_PATH: 'gs://bah-libvirt-images-ue1/virl-base-images/kali-linux-new'
  _GS_CML_IMAGE_DEFINITION_PATH: 'gs://bah-libvirt-images-ue1/virl-base-images/kali-linux-new.yaml'

steps:
  # Download from https://kali.download/cloud-images/current/ and import as GCE image when not already present.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: import-kali-generic
    script: |
      #!/usr/bin/env bash

      set -e
      set -x 
      env 

      KALI_URL="https://kali.download/cloud-images/kali-${_KALI_VER}/kali-linux-${_KALI_VER}-cloud-genericcloud-amd64.tar.xz"
      KALI_VERSION_DASHED="$(tr '.' '-' <<< "${_KALI_VER}")"
      GCS_IMPORT="gs://bah-machine-images/kali-import/${BUILD_ID}-disk.raw"
      IMAGE_NAME="kali-linux-${KALI_VERSION_DASHED}-$(date +%Y-%m-%d)-cloud-genericcloud-amd64"

      if gcloud compute images describe-from-family "${_GCE_BASE_SOURCE_FAMILY}" --project="${PROJECT_ID}" 2>/dev/null; then
        echo "Image family ${_GCE_BASE_SOURCE_FAMILY} already exists. Skipping GCE base image creation."
        exit 0
      fi
        
      echo "Installing xz-utils for tar extraction..."
      apt-get update -qq && apt-get install -y -qq xz-utils curl jq
      echo "Downloading Kali generic cloud image from ${KALI_URL}..."
      curl -fsSL -o kali.tar.xz "${KALI_URL}"
      echo "Extracting disk.raw from tarball..."
      tar -xJf kali.tar.xz
      rm kali.tar.xz
      DISK_RAW="$(find . -name 'disk.raw' -type f | head -1)"
      if [ -z "${DISK_RAW}" ] || [ ! -f "${DISK_RAW}" ]; then
        echo "disk.raw not found in tarball. Contents:"
        find . -type f
        exit 1
      fi
      echo "Uploading disk image to ${GCS_IMPORT}..."
      gsutil -q cp "${DISK_RAW}" "${GCS_IMPORT}"
      rm -f "${DISK_RAW}"

      IMPORT_JOB_NAME="image-import-${BUILD_ID}"
      echo 'Importing image into GCP.  This may take 15-30 minutes...'
      # Kali Linux is not supported by the OS adaptation service, so we skip it.
      gcloud migration vms image-imports create "${IMPORT_JOB_NAME}" \
        --source-file="${GCS_IMPORT}" \
        --image-name="${IMAGE_NAME}" \
        --project="${PROJECT_ID}" \
        --target-project="${PROJECT_ID}" \
        --family-name="${_GCE_BASE_SOURCE_FAMILY}" \
        --location="${LOCATION}" \
        --single-region-storage \
        --skip-os-adaptation \
        --description="Kali Linux ${_KALI_VER} generic cloud (imported from kali.download)"

      echo 'Waiting for image import to complete. This may take 20-30 minutes...'
      for i in $(seq 1 60); do
        STATUS=$(gcloud migration vms image-imports describe "${IMPORT_JOB_NAME}" --project="${PROJECT_ID}" --location="${LOCATION}" --format json | jq -r .recentImageImportJobs[0].state 2> /dev/null || echo "UNKNOWN")
        echo "Image import status: ${STATUS}"
        if [ "${STATUS}" = "SUCCEEDED" ]; then break; fi
        if [ "${STATUS}" != "RUNNING" ]; then echo "Unexpected status: ${STATUS}"; exit 1; fi
        sleep 30
      done

      if [ "${STATUS}" != "SUCCEEDED" ]; then
        echo "Image import failed. Check output."
        exit 1
      fi

      echo "Removing temporary object ${GCS_IMPORT}..."
      gsutil -q rm "${GCS_IMPORT}" 2>/dev/null || true
      echo "Image ${IMAGE_NAME} imported and set as family ${_GCE_BASE_SOURCE_FAMILY}."
    env:
      - 'LOCATION=$LOCATION'
      - 'PROJECT_ID=$PROJECT_ID'
      - 'BUILD_ID=$BUILD_ID'
      - 'APT_OPTS="-o Dpkg::Options::=--force-confmiss -o Dpkg::Options::=--force-confnew -o DPkg::Progress-Fancy=0 -o APT::Color=0"'
    timeout: '3600s'

  # Create GCE base image for Packer when not already present (README: "GCE Base Kali Image").
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: create-gce-base
    script: |
      #!/usr/bin/env bash
      set -e
      set -x
      env

      # Only PROJECT_ID, LOCATION, BUILD_ID, _GCE_BASE_FAMILY, _GCE_BASE_SOURCE_FAMILY are Cloud Build substitutions
      ZONE="${LOCATION}-b"
      INSTANCE_NAME="kali-gce-base-${BUILD_ID}"
      KALI_VERSION_DASHED="$(tr '.' '-' <<< "${_KALI_VER}")"
      IMAGE_NAME="kali-linux-${KALI_VERSION_DASHED}-$(date +%Y-%m-%d)-cloud-gce-amd64"
      if gcloud compute images describe-from-family "${_GCE_BASE_FAMILY}" --project="${PROJECT_ID}" --location="${LOCATION}" 2>/dev/null; then
        echo "Image family ${_GCE_BASE_FAMILY} already exists. Skipping GCE base image creation."
        exit 0
      fi
      echo "Creating VM to build GCE base image from family ${_GCE_BASE_SOURCE_FAMILY}..."
      gcloud compute instances create "${INSTANCE_NAME}" \
        --project="${PROJECT_ID}" \
        --zone="${ZONE}" \
        --image-family="${_GCE_BASE_SOURCE_FAMILY}" \
        --machine-type=e2-medium \
        --metadata-from-file=user-data=/workspace/scripts/create-gce-base.sh \
        --metadata=serial-port-enable=TRUE \
        --scopes=cloud-platform \
        --service-account=${SERVICE_ACCOUNT_EMAIL}

      echo "Waiting for VM to complete startup script and shut down (this may take 20-30 minutes)..."
      for i in $(seq 1 60); do
        STATUS=$(gcloud compute instances describe "${INSTANCE_NAME}" --zone="${ZONE}" --project="${PROJECT_ID}" --format='value(status)' 2>/dev/null || echo "UNKNOWN")
        echo "Instance status: ${STATUS}"
        if [ "${STATUS}" = "TERMINATED" ]; then break; fi
        if [ "${STATUS}" != "RUNNING" ]; then echo "Unexpected status: ${STATUS}"; exit 1; fi
        sleep 30
      done
      if [ "${STATUS}" != "TERMINATED" ]; then
        echo "VM did not terminate in time. Check serial console output."
        exit 1
      fi
      echo "Creating image from boot disk..."
      gcloud compute images create "${IMAGE_NAME}" \
        --project="${PROJECT_ID}" \
        --source-disk="${INSTANCE_NAME}" \
        --source-disk-zone="${ZONE}" \
        --family="${_GCE_BASE_FAMILY}" \
        --storage-location=us-east1 \
        --description="${IMAGE_NAME}" \
        --architecture=X86_64
      echo "Deleting temporary instance and disk..."
      gcloud compute instances delete "${INSTANCE_NAME}" --zone="${ZONE}" --project="${PROJECT_ID}"
      echo "GCE base image ${IMAGE_NAME} created in family ${_GCE_BASE_FAMILY}."
    env:
      - 'LOCATION=$LOCATION'
      - 'PROJECT_ID=$PROJECT_ID'
      - 'BUILD_ID=$BUILD_ID'
    timeout: '2400s'

  # This image can be made with cloud-builder/Dockerfile   
  - name: 'us-east1-docker.pkg.dev/gcp-asigbahgcp-nprd-47930/bah-builders/bah-kali-linux-img'
    script: |
      #!/usr/bin/env bash

      set -e
      set -x
      env

      echo "Locale settings:"
      cat /etc/default/locale

      if [ "$BUILD_TYPE" = "pristine" ]; then
        SOURCE_IMAGE_FAMILY="kali-linux-cloud-gce-amd64"
        PROVISION_SCRIPT="setup.sh"
      elif [ "$BUILD_TYPE" = "tweaks" ]; then
        SOURCE_IMAGE_FAMILY="kali-linux-cloud-cml-amd64"
        PROVISION_SCRIPT="tweaks.sh"
      else
        echo "Invalid build type: $_BUILD_TYPE"
        exit 1
      fi

      # SSH key pair for Packer.  Will be removed after build.
      mkdir -vp secrets
      ssh-keygen -t ed25519 -f secrets/id_ed25519 -C "root@kali" -N ""

      # Build Kali Linux image with Packer
      packer init kali-gce.pkr.hcl
      packer validate \
        -var "service_account_email=$SERVICE_ACCOUNT_EMAIL" \
        -var "zone=$ZONE" \
        -var "project_id=$PROJECT_ID" \
        -var "source_image_family=$SOURCE_IMAGE_FAMILY" \
        -var "provision_script=$PROVISION_SCRIPT" \
        kali-gce.pkr.hcl
      packer build \
        -var "service_account_email=$SERVICE_ACCOUNT_EMAIL" \
        -var "zone=$ZONE" \
        -var "project_id=$PROJECT_ID" \
        -var "source_image_family=$SOURCE_IMAGE_FAMILY" \
        -var "provision_script=$PROVISION_SCRIPT" \
        kali-gce.pkr.hcl

      if [ -f /workspace/manifest.json ]; then
        jq . /workspace/manifest.json

        IMAGE=$(jq -r .builds[0].artifact_id /workspace/manifest.json)

        gcloud compute images export \
          --compute-service-account $SERVICE_ACCOUNT_EMAIL \
          --cloudbuild-service-account $SERVICE_ACCOUNT_EMAIL \
          --zone $ZONE \
          --image $IMAGE \
          --log-location ${GS_IMAGE_PATH} \
          --export-format qcow2 \
          --destination-uri ${GS_CML_IMAGE_PATH}/${IMAGE}.qcow2
        
        sed -i "s/DISK_IMAGE_NAME/${IMAGE}.qcow2/" /workspace/cml/image-definition.yaml
        gcloud storage cp /workspace/cml/image-definition.yaml ${GS_CML_IMAGE_DEFINITION_PATH}
      fi

    env:
      - 'KALI_VERSION=$_KALI_VER'
      - 'CML_ENDPOINT=$_CML_ENDPOINT'
      - 'GS_IMAGE_PATH=$_GS_IMAGE_PATH'
      - 'GS_CML_IMAGE_PATH=$_GS_CML_IMAGE_PATH'
      - 'GS_CML_IMAGE_DEFINITION_PATH=$_GS_CML_IMAGE_DEFINITION_PATH'
      - 'BUILD_TYPE=$_BUILD_TYPE'
      - 'APT_OPTS="-o Dpkg::Options::=--force-confmiss -o Dpkg::Options::=--force-confnew -o DPkg::Progress-Fancy=0 -o APT::Color=0"'
      - 'DEBIAN_FRONTEND=noninteractive'
      - 'TZ=Etc/UTC'
      - 'PACKER_LOG=1'
      - 'LOCATION=$LOCATION'
      - 'PROJECT_ID=$PROJECT_ID'
      - 'ZONE=$LOCATION-b'
      - 'SERVICE_ACCOUNT_EMAIL=$SERVICE_ACCOUNT_EMAIL'

logsBucket: 'gs://bah-build-logs/bah-kali-linux-img'
serviceAccount: 'projects/gcp-asigbahgcp-nprd-47930/serviceAccounts/build-bah-kali-linux-img@gcp-asigbahgcp-nprd-47930.iam.gserviceaccount.com'

options:
  logging: GCS_ONLY
  logStreamingOption: STREAM_ON
  automapSubstitutions: true
