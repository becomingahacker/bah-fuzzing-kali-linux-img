substitutions:
  - '_KALI_VER=2025.4'
  - '_GCE_BASE_SOURCE_FAMILY=kali-linux-cloud-genericcloud-amd64'
  - '_GCE_BASE_FAMILY=kali-linux-cloud-gce-amd64'

steps:
  # Download from https://kali.download/cloud-images/current/ and import as GCE image when not already present.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: import-kali-generic
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        KALI_VER="${_KALI_VER}"
        FAMILY="${_GCE_BASE_SOURCE_FAMILY}"
        IMAGE_NAME="kali-linux-${_KALI_VER}-${_GCE_BASE_SOURCE_FAMILY}"
        KALI_URL="https://kali.download/cloud-images/current/kali-linux-${_KALI_VER}-${_GCE_BASE_SOURCE_FAMILY}.tar.xz"
        GCS_IMPORT="gs://bah-machine-images/kali-import/${BUILD_ID}-disk.raw"
        if gcloud compute images describe-from-family "${FAMILY}" --project="${PROJECT_ID}" 2>/dev/null; then
          echo "Image family ${FAMILY} already exists. Skipping download/import from kali.download."
          exit 0
        fi
        echo "Installing xz-utils for tar extraction..."
        apt-get update -qq && apt-get install -y -qq xz-utils curl
        echo "Downloading Kali generic cloud image from ${KALI_URL}..."
        curl -fsSL -o kali.tar.xz "${KALI_URL}"
        echo "Extracting disk.raw from tarball..."
        tar -xJf kali.tar.xz
        rm kali.tar.xz
        DISK_RAW="$(find . -name 'disk.raw' -type f | head -1)"
        if [ -z "${DISK_RAW}" ] || [ ! -f "${DISK_RAW}" ]; then
          echo "disk.raw not found in tarball. Contents:"
          find . -type f
          exit 1
        fi
        echo "Uploading disk image to ${GCS_IMPORT}..."
        gsutil -q cp "${DISK_RAW}" "${GCS_IMPORT}"
        rm -f "${DISK_RAW}"
        echo "Importing image into GCP (this may take 15-30 minutes)..."
        gcloud compute images import "${IMAGE_NAME}" \
          --project="${PROJECT_ID}" \
          --source-file="${GCS_IMPORT}" \
          --os=debian-12 \
          --family="${FAMILY}" \
          --storage-location=us-east1 \
          --description="Kali Linux ${KALI_VER} generic cloud (imported from kali.download)"
        echo "Removing temporary object ${GCS_IMPORT}..."
        gsutil -q rm "${GCS_IMPORT}" 2>/dev/null || true
        echo "Image ${IMAGE_NAME} imported and set as family ${FAMILY}."
    timeout: '3600s'

  # Create GCE base image for Packer when not already present (README: "GCE Base Kali Image").
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: create-gce-base
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        # Only PROJECT_ID, LOCATION, BUILD_ID, _GCE_BASE_FAMILY, _GCE_BASE_SOURCE_FAMILY are Cloud Build substitutions
        ZONE="${LOCATION}-b"
        INSTANCE_NAME="kali-gce-base-${BUILD_ID}"
        IMAGE_NAME="kali-linux-$$(date +%Y-%m-%d)-cloud-gce-amd64"
        if gcloud compute images describe-from-family "${_GCE_BASE_FAMILY}" --project="${PROJECT_ID}" 2>/dev/null; then
          echo "Image family ${_GCE_BASE_FAMILY} already exists. Skipping GCE base image creation."
          exit 0
        fi
        echo "Creating VM to build GCE base image from family ${_GCE_BASE_SOURCE_FAMILY}..."
        gcloud compute instances create "$${INSTANCE_NAME}" \
          --project="${PROJECT_ID}" \
          --zone="$${ZONE}" \
          --image-family="${_GCE_BASE_SOURCE_FAMILY}" \
          --machine-type=e2-medium \
          --metadata-from-file=startup-script=/workspace/scripts/create-gce-base.sh \
          --scopes=cloud-platform
        echo "Waiting for VM to complete startup script and shut down (this may take 20-30 minutes)..."
        for i in $$(seq 1 60); do
          STATUS=$$(gcloud compute instances describe "$${INSTANCE_NAME}" --zone="$${ZONE}" --project="${PROJECT_ID}" --format='value(status)' 2>/dev/null || echo "UNKNOWN")
          echo "Instance status: $${STATUS}"
          if [ "$${STATUS}" = "TERMINATED" ]; then break; fi
          sleep 30
        done
        if [ "$${STATUS}" != "TERMINATED" ]; then
          echo "VM did not terminate in time. Check serial console output."
          exit 1
        fi
        echo "Creating image from boot disk..."
        gcloud compute images create "$${IMAGE_NAME}" \
          --project="${PROJECT_ID}" \
          --source-disk="$${INSTANCE_NAME}" \
          --source-disk-zone="$${ZONE}" \
          --family="${_GCE_BASE_FAMILY}" \
          --storage-location=us-east1 \
          --description="$${IMAGE_NAME}"
        echo "Deleting temporary instance and disk..."
        gcloud compute instances delete "$${INSTANCE_NAME}" --zone="$${ZONE}" --project="${PROJECT_ID}" --delete-disks=boot -q
        echo "GCE base image $${IMAGE_NAME} created in family ${_GCE_BASE_FAMILY}."
    env:
      - 'LOCATION=$LOCATION'
      - 'PROJECT_ID=$PROJECT_ID'
      - 'BUILD_ID=$BUILD_ID'
    timeout: '2400s'

  - name: 'us-east1-docker.pkg.dev/gcp-asigbahgcp-nprd-47930/bah-builders/bah-kali-linux-img'
    env:
      - 'KALI_VERSION=2025.2'
      - 'CML_ENDPOINT=https://becomingahacker.com'
      - 'GS_IMAGE_PATH=gs://bah-machine-images/kali-linux'
      # Pristine
      - 'SOURCE_IMAGE_FAMILY=kali-linux-cloud-gce-amd64'
      # Tweaks
      #- 'SOURCE_IMAGE_FAMILY=kali-linux-cloud-cml-amd64'
      # Pristine
      - 'PROVISION_SCRIPT=setup.sh'
      # Tweaks
      #- 'PROVISION_SCRIPT=tweaks.sh'
      - 'APT_OPTS="-o Dpkg::Options::=--force-confmiss -o Dpkg::Options::=--force-confnew -o DPkg::Progress-Fancy=0 -o APT::Color=0"'
      - 'DEBIAN_FRONTEND=noninteractive'
      - 'TZ=Etc/UTC'
      - 'PACKER_LOG=1'
      - 'LOCATION=$LOCATION'
      - 'PROJECT_ID=$PROJECT_ID'
      - 'ZONE=$LOCATION-b'
      - 'SERVICE_ACCOUNT_EMAIL=$SERVICE_ACCOUNT_EMAIL'

    script: |
      #!/usr/bin/env bash

      set -e
      #set -x

      env

      echo "Locale settings:"
      cat /etc/default/locale

      # SSH key pair for Packer.  Will be removed after build.
      mkdir -vp secrets
      ssh-keygen -t ed25519 -f secrets/id_ed25519 -C "root@kali" -N ""

      # Build Kali Linux image with Packer
      packer init kali-gce.pkr.hcl
      packer validate \
        -var "service_account_email=$SERVICE_ACCOUNT_EMAIL" \
        -var "zone=$ZONE" \
        -var "project_id=$PROJECT_ID" \
        -var "source_image_family=$SOURCE_IMAGE_FAMILY" \
        -var "provision_script=$PROVISION_SCRIPT" \
        kali-gce.pkr.hcl
      packer build \
        -var "service_account_email=$SERVICE_ACCOUNT_EMAIL" \
        -var "zone=$ZONE" \
        -var "project_id=$PROJECT_ID" \
        -var "source_image_family=$SOURCE_IMAGE_FAMILY" \
        -var "provision_script=$PROVISION_SCRIPT" \
        kali-gce.pkr.hcl

      if [ -f /workspace/manifest.json ]; then
        jq . /workspace/manifest.json

        IMAGE=$(jq -r .builds[0].artifact_id /workspace/manifest.json)

        gcloud compute images export \
          --compute-service-account $SERVICE_ACCOUNT_EMAIL \
          --cloudbuild-service-account $SERVICE_ACCOUNT_EMAIL \
          --zone $ZONE \
          --image $IMAGE \
          --log-location ${GS_IMAGE_PATH} \
          --export-format qcow2 \
          --destination-uri ${GS_IMAGE_PATH}/${IMAGE}.qcow2
      fi


logsBucket: 'gs://bah-build-logs/bah-kali-linux-img'
serviceAccount: 'projects/gcp-asigbahgcp-nprd-47930/serviceAccounts/build-bah-kali-linux-img@gcp-asigbahgcp-nprd-47930.iam.gserviceaccount.com'
projectId: 'gcp-asigbahgcp-nprd-47930'

options:
  logging: GCS_ONLY
  logStreamingOption: STREAM_ON
