id: ubuntu-fuzzing
general:
  description: Ubuntu Fuzzing image with fuzzing tools
  nature: server
  read_only: false
device:
  interfaces:
    has_loopback_zero: false
    physical:
      - eth0
      - eth1
      - eth2
    serial_ports: 2
    default_count: 1
ui:
  visible: true
  label_prefix: ubuntu-
  icon: host
  label: Ubuntu Fuzzing
  description: Ubuntu Fuzzing image with fuzzing tools
sim:
  linux_native:
    libvirt_domain_driver: kvm
    driver: server
    disk_driver: virtio
    ram: 12288
    cpus: 2
    cpu_limit: 100
    boot_disk_size: 64
    nic_driver: virtio
    video:
      model: qxl
      memory: 16
    efi_boot: false
boot:
  timeout: 10
  uses_regex: false
inherited:
  image:
    ram: true
    cpus: true
    cpu_limit: true
    data_volume: true
    boot_disk_size: true
  node:
    ram: true
    cpus: true
    cpu_limit: true
    data_volume: true
    boot_disk_size: true
configuration:
  generator:
    driver: ubuntu
  provisioning:
    volume_name: cidata
    media_type: iso
    files:
      - name: meta-data
        content: |-
          instance-id: ubuntu-fuzzing
          local-hostname: ubuntu-fuzzing
        editable: false
      - name: user-data
        content: |-
          #cloud-config
          hostname: ubuntu-fuzzing-default
          manage_etc_hosts: true

          users:
            - default
            - name: cisco
              gecos: Cisco
              groups: users, adm, sudo
              plain_text_passwd: cisco
              lock_passwd: false
              shell: /bin/bash

          runcmd:
            - [ chown, -R, cisco:cisco, /home/cisco ]
            - [ chmod, 755, /home/cisco ]
            - dpkg-reconfigure -f noninteractive xorg
        editable: true
schema_version: 0.0.1
